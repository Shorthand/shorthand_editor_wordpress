---
version: 2.1
parameters:
  PLUGIN_SUBDIR:
    type: string
    default: "plugins/wp/the-shorthand-editor"

release_only: &release_only
  filters:
    branches:
      only:
        - production

commands:
  upload-plugin-zip-to-s3:
    parameters:
      s3_bucket:
        type: string
      plugin_subdir:
        type: string
      latest_object_key:
        type: string
      versioned_object_key:
        type: string
      cf_invalidation_paths:
        type: string
    steps:
      - run:
          name: Upload plugin zip to S3
          command: |
            S3_BUCKET="<< parameters.s3_bucket >>"
            PLUGIN_SUBDIR_VALUE="<< parameters.plugin_subdir >>"
            LATEST_OBJECT_KEY="<< parameters.latest_object_key >>"
            VERSIONED_OBJECT_KEY="<< parameters.versioned_object_key >>"
            CF_INVALIDATION_PATHS_VALUE="<< parameters.cf_invalidation_paths >>"

            if [[ -z "$S3_BUCKET" ]]; then
              echo "S3 bucket is missing."
              exit 1
            fi
            if [[ -z "${PLUGIN_ZIP:-}" ]]; then
              echo "PLUGIN_ZIP is missing."
              exit 1
            fi
            if [[ -z "$LATEST_OBJECT_KEY" || -z "$VERSIONED_OBJECT_KEY" ]]; then
              echo "S3 object key is missing."
              exit 1
            fi
            if [[ -z "$PLUGIN_SUBDIR_VALUE" ]]; then
              echo "Plugin subdirectory is missing."
              exit 1
            fi
            if [[ -z "$CF_INVALIDATION_PATHS_VALUE" ]]; then
              echo "CF invalidation paths are missing."
              exit 1
            fi

            printf 'export CF_INVALIDATION_PATHS=%q\n' "$CF_INVALIDATION_PATHS_VALUE" >> "$BASH_ENV"
            aws s3 cp "$PLUGIN_ZIP" "s3://${S3_BUCKET}/${LATEST_OBJECT_KEY}"
            aws s3 cp "$PLUGIN_ZIP" "s3://${S3_BUCKET}/${VERSIONED_OBJECT_KEY}"
            aws s3 cp "deploy/update.json" "s3://${S3_BUCKET}/${PLUGIN_SUBDIR_VALUE}/update.json"
            aws s3 sync "deploy/assets" "s3://${S3_BUCKET}/${PLUGIN_SUBDIR_VALUE}/assets"

  install-gh-cli:
    steps:
      - run:
          name: Install GH CLI if needed
          command: |
            if command -v gh >/dev/null 2>&1; then
              echo "gh already installed: $(gh --version | head -n 1)"
              exit 0
            fi

            # Install GH - https://github.com/cli/cli/blob/trunk/docs/install_linux.md
            (type -p curl >/dev/null || (sudo apt-get update && sudo apt-get install -y curl)) \
              && sudo mkdir -p -m 755 /etc/apt/keyrings \
              && out=$(mktemp) && curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o "$out" \
              && sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg < "$out" >/dev/null \
              && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
              && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
              && sudo apt-get update \
              && sudo apt-get install -y gh

  install-jq:
    steps:
      - run:
          name: Install jq if needed
          command: |
            if command -v jq >/dev/null 2>&1; then
              echo "jq already installed: $(jq --version)"
              exit 0
            fi

            sudo apt-get update
            sudo apt-get install -y jq

  fetch-prune:
    steps:
      - run:
          # Without this, the build won't be able to access commits
          # in the production branch.
          name: Fetch all branches
          command: git fetch --all --prune

  run-build:
    steps:
      - checkout:
          method: blobless
      - run:
          name: Add PNPM at desired version
          command: sudo npm -g install pnpm@9
      - run:
          name: run-build
          command: |
            pnpm install --no-frozen-lockfile
            pnpm build

  run-plugin-bundle-and-upload:
    steps:
      - run:
          name: run-plugin-bundle-and-upload
          command: |
            pnpm bundle

            PLUGIN_ZIP="$(find dist -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
            if [[ -z "$PLUGIN_ZIP" ]]; then
              echo "Expected plugin zip not found in dist/ after pnpm bundle."
              exit 1
            fi
            PLUGIN_FILENAME="$(basename "$PLUGIN_ZIP")"
            PLUGIN_SUBDIR="${WORDPRESS_PLUGIN_SUBDIR:-<< pipeline.parameters.PLUGIN_SUBDIR >>}"

            {
              echo "export PLUGIN_ZIP=${PLUGIN_ZIP}"
              echo "export PLUGIN_FILENAME=${PLUGIN_FILENAME}"
              echo "export PLUGIN_SUBDIR=${PLUGIN_SUBDIR}"
            } >> "$BASH_ENV"
      - when:
          condition:
            ## TODO: update below to master prior to merging
            equal: ["test/release-changes", << pipeline.git.branch >>]
          steps:
            - aws_cli
            - wp_plugin_aws_role:
                role_arn: "$AWS_ROLE_ARN_NP"
                role_label: "Non-Production"
            - run:
                name: Prepare non-production upload metadata
                command: |
                  if [[ -z "$WORDPRESS_PLUGIN_BUCKET_NP" ]]; then
                    echo "WORDPRESS_PLUGIN_BUCKET_NP is missing."
                    exit 1
                  fi
                  if [[ -z "$CIRCLE_BUILD_NUM" ]]; then
                    echo "CIRCLE_BUILD_NUM is missing for master deploy."
                    exit 1
                  fi
                  PLUGIN_VERSION="v${CIRCLE_BUILD_NUM}"
                  CF_INVALIDATION_PATHS="/${PLUGIN_SUBDIR}/update.json /${PLUGIN_SUBDIR}/assets/* /${PLUGIN_SUBDIR}/${PLUGIN_FILENAME} /${PLUGIN_SUBDIR}/${PLUGIN_VERSION}/*"
                  {
                    printf 'export PLUGIN_VERSION=%q\n' "$PLUGIN_VERSION"
                    printf 'export CF_INVALIDATION_PATHS=%q\n' "$CF_INVALIDATION_PATHS"
                    printf 'export LATEST_OBJECT_KEY=%q\n' "${PLUGIN_SUBDIR}/${PLUGIN_FILENAME}"
                    printf 'export VERSIONED_OBJECT_KEY=%q\n' "${PLUGIN_SUBDIR}/${PLUGIN_VERSION}/${PLUGIN_FILENAME}"
                  } >> "$BASH_ENV"
            - upload-plugin-zip-to-s3:
                s3_bucket: "$WORDPRESS_PLUGIN_BUCKET_NP"
                plugin_subdir: "$PLUGIN_SUBDIR"
                latest_object_key: "$LATEST_OBJECT_KEY"
                versioned_object_key: "$VERSIONED_OBJECT_KEY"
                cf_invalidation_paths: "$CF_INVALIDATION_PATHS"

      - when:
          condition:
            equal: ["production", << pipeline.git.branch >>]
          steps:
            - aws_cli
            - wp_plugin_aws_role:
                role_arn: "$AWS_ROLE_ARN_PR"
                role_label: "Production"
            - run:
                name: Prepare production upload metadata
                command: |
                  if [[ -z "$WORDPRESS_PLUGIN_BUCKET_PR" ]]; then
                    echo "WORDPRESS_PLUGIN_BUCKET_PR is missing."
                    exit 1
                  fi
                  VERSION_PATH="$(git tag --points-at HEAD | head -n 1)"
                  if [[ -z "$VERSION_PATH" ]]; then
                    echo "No git tag found on commit $CIRCLE_SHA1. Tag the commit before deploy."
                    exit 1
                  fi

                  ## TODO: Simon, please update below to retrieve the version from the php file or update.json
                  ## whichever is the source of truth
                  PLUGIN_VERSION="v${grep something from file}"
                  CF_INVALIDATION_PATHS="/${PLUGIN_SUBDIR}/update.json /${PLUGIN_SUBDIR}/assets/* /${FILENAME_PREFIX}/${PLUGIN_FILENAME} /${PLUGIN_SUBDIR}/${PLUGIN_VERSION}/*"
                  {
                    printf 'export PLUGIN_VERSION=%q\n' "$PLUGIN_VERSION"
                    printf 'export CF_INVALIDATION_PATHS=%q\n' "$CF_INVALIDATION_PATHS"
                    printf 'export LATEST_OBJECT_KEY=%q\n' "${FILENAME_PREFIX}/${PLUGIN_FILENAME}"
                    printf 'export VERSIONED_OBJECT_KEY=%q\n' "${PLUGIN_SUBDIR}/${PLUGIN_VERSION}"
                  } >> "$BASH_ENV"
            - upload-plugin-zip-to-s3:
                s3_bucket: "$WORDPRESS_PLUGIN_BUCKET_PR"
                plugin_subdir: "$PLUGIN_SUBDIR"
                latest_object_key: "$LATEST_OBJECT_KEY"
                versioned_object_key: "$VERSIONED_OBJECT_KEY"
                cf_invalidation_paths: "$CF_INVALIDATION_PATHS"

  get-prs:
    steps:
      - checkout:
          method: blobless
      - install-gh-cli
      - install-jq
      - fetch-prune
      - run:
          name: Get Pull requests
          command: |
            commit_logs=$(git log origin/production..origin/master --pretty=format:"%H" | xargs)

            for commit in $commit_logs; do
              res=$(gh api repos/shorthand/shorthand_editor_wordpress/commits/${commit}/pulls \
                --jq '.[0] | {title: .title, html_url: .html_url}')
              echo "API response for commit ${commit}: ${res}"

              pr_data=$(echo "$res" | jq -r '"\(.title) - \(.html_url)"')
              echo $pr_data

              # Format the output as required
              # pr_formatted_results+=$(echo "$res" | jq -r '"\(.title) - \(.html_url)\n"')


              # Print the result (for debugging)
              # echo -e "$pr_formatted_results"
            done

  tag-release:
    steps:
      - checkout:
          method: blobless
      - fetch-prune
      - install-jq
      - install-gh-cli
      - run:
          name: Rebase production branch into master and push upstream
          command: |
            git checkout production && \
              git rebase origin/master && \
              git push origin production
      - run:
          name: Create tag-release
          command: |
            # Get the latest tag release.
            latest_tag=$(gh release view --json tagName --jq '.tagName')
            # Bump the minor version.
            new_tag=$(echo "$latest_tag" | awk -F. '{printf "0.%d.0", $2+1}')
            # Bump the tag when creating the release.
            gh release create ${new_tag} --title ${new_tag} --generate-notes

  # Create an OIDC identity provider in the AWS account is required. For more
  # information, please see
  # https://circleci.com/docs/openid-connect-tokens/?utm_source=google&utm_medium=sem&utm_campaign=sem-google-dg--japac-en-dsa-tROAS-auth-brand&utm_term=g_-_c__dsa_&utm_content=#setting-up-your-cloud-service
  wp_plugin_aws_role:
    parameters:
      role_arn:
        type: string
      role_label:
        type: string
      iam_session_duration:
        type: integer
        default: 900
    steps:
      - run:
          name: Assume WP Plugin << parameters.role_label >> AWS IAM ROLE
          command: |
            #!/bin/bash -eo pipefail
            ROLE_ARN="<< parameters.role_arn >>"
            if [[ -z "$ROLE_ARN" ]]; then
              echo "Role ARN is missing for << parameters.role_label >> role."
              exit 1
            fi

            # Session name limit of 64 characters
            SHORT_WORKFLOW_ID="${CIRCLE_WORKFLOW_ID%%-*}"
            PARAM_ROLE_SESSION_NAME="$(printf 'cci-%s-%s' "${SHORT_WORKFLOW_ID}" "${CIRCLE_BUILD_NUM:-0}" | cut -c1-64)"
            read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN < <(
              aws sts assume-role-with-web-identity \
                --role-arn "$ROLE_ARN" \
                --role-session-name "$PARAM_ROLE_SESSION_NAME" \
                --web-identity-token "$CIRCLE_OIDC_TOKEN" \
                --duration-seconds << parameters.iam_session_duration >> \
                --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                --output text
            )
            {
              printf 'export AWS_ACCESS_KEY_ID=%q\n' "$AWS_ACCESS_KEY_ID"
              printf 'export AWS_SECRET_ACCESS_KEY=%q\n' "$AWS_SECRET_ACCESS_KEY"
              printf 'export AWS_SESSION_TOKEN=%q\n' "$AWS_SESSION_TOKEN"
            } >>"$BASH_ENV"

  aws_cli:
    description: Setup AWS CLI
    steps:
      - run: sudo curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      - run: sudo unzip -q awscliv2.zip
      - run: sudo ./aws/install --update

jobs:
  wp-plugin-build:
    docker:
      - image: &node_docker_image cimg/node:20.12
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    resource_class: small
    steps:
      - run-build

  wp-plugin-bundle-and-upload:
    docker:
      - image: *node_docker_image
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    resource_class: small
    steps:
      - run-build
      - run-plugin-bundle-and-upload
      - run:
          name: Persist bundle/upload build metadata
          command: |
            mkdir -p /tmp/cci-shared
            if [[ -z "${CF_INVALIDATION_PATHS:-}" ]]; then
              echo "CF_INVALIDATION_PATHS is missing after upload step."
              exit 1
            fi
            printf 'export CF_INVALIDATION_PATHS=%q\n' "$CF_INVALIDATION_PATHS" > /tmp/cci-shared/build-metadata.env
      - persist_to_workspace:
          root: /tmp
          paths:
            - cci-shared/build-metadata.env

  wp-plugin-pre-release:
    docker:
      - image: *node_docker_image
    resource_class: small
    steps:
      - get-prs

  wp-plugin-release:
    docker:
      - image: *node_docker_image
    resource_class: small
    steps:
      - tag-release

  wp-plugin-invalidate-cf:
    parameters:
      role_arn:
        type: string
      role_label:
        type: string
      distribution_id:
        type: string
    docker:
      - image: *node_docker_image
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    resource_class: small
    steps:
      - checkout:
          method: blobless
      - attach_workspace:
          at: /tmp
      - aws_cli
      - wp_plugin_aws_role:
          role_arn: "<< parameters.role_arn >>"
          role_label: "<< parameters.role_label >>"
      - run:
          name: Invalidate CloudFront cache
          command: |
            DIST_ID="<< parameters.distribution_id >>"
            if [[ -z "$DIST_ID" ]]; then
              echo "Missing CloudFront distribution id for << parameters.role_label >>."
              exit 1
            fi

            if [[ ! -f /tmp/cci-shared/build-metadata.env ]]; then
              echo "Missing /tmp/cci-shared/build-metadata.env from bundle/upload job."
              exit 1
            fi
            # shellcheck disable=SC1091
            source /tmp/cci-shared/build-metadata.env
            if [[ -z "$CF_INVALIDATION_PATHS" ]]; then
              echo "CF_INVALIDATION_PATHS is missing from workspace metadata."
              exit 1
            fi
            # CF_INVALIDATION_PATHS is a space-separated list of paths.
            set -f
            # shellcheck disable=SC2086
            INVALIDATION_OUTPUT=$(aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths $CF_INVALIDATION_PATHS \
              --output json)
            set +f

            echo "CloudFront invalidation output:"
            echo "$INVALIDATION_OUTPUT"

            INVALIDATION_ID=$(printf '%s\n' "$INVALIDATION_OUTPUT" | awk -F'"' '/"Id":/ {print $4; exit}')
            echo "Created CloudFront invalidation: ${INVALIDATION_ID:-unknown}"

workflows:
  wp-plugin-workflow:
    when:
      not:
        equal: [scheduled_pipeline, << pipeline.trigger_source >>]
    jobs:
      - wp-plugin-build:
          filters:
            branches:
              ignore:
                - production
                - master
      - wp-plugin-bundle-and-upload:
          context:
            - wp-plugin-upload-context
          filters:
            branches:
              only:
                ## TODO: replace below with master branch
                ## - master
                - test/release-changes
      - wp-plugin-invalidate-cf:
          name: invalidate-cf-non-production
          role_arn: "$AWS_ROLE_ARN_NP"
          role_label: "Non-Production"
          distribution_id: "$CLOUDFRONT_DISTRIBUTION_ID_NP"
          context:
            - wp-plugin-upload-context
          requires:
            - wp-plugin-bundle-and-upload
          filters:
            branches:
              only:
                ## TODO: replace below with master branch
                ## - master
                - test/release-changes

  production-release:
    when:
      and:
        - equal: [api, << pipeline.trigger_source >>]
        - equal: ["production", <<pipeline.git.branch>>]

    jobs:
      - wp-plugin-bundle-and-upload:
          <<: *release_only
          name: bundle-and-upload
          context:
            - wp-plugin-upload-context

      - wp-plugin-release:
          <<: *release_only
          context:
            - wp-plugin-upload-context
          requires:
            - bundle-and-upload

      - wp-plugin-invalidate-cf:
          <<: *release_only
          role_arn: "$AWS_ROLE_ARN_PR"
          role_label: "Production"
          distribution_id: "$CLOUDFRONT_DISTRIBUTION_ID_PR"
          context:
            - wp-plugin-upload-context
          requires:
            - wp-plugin-release
